appId: com.ikikecollective.bennastockmanager
productName: Benna Projects Manager
npmRebuild: true
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - server/**/*
  - database.sqlite
  - package.json
  - .env

# Unpack native .node binaries from the ASAR archive so they can be
# loaded at runtime (native modules cannot be dlopen'd from inside ASAR).
asarUnpack:
  - "**/*.node"
  - "node_modules/**/*"
  - "server/**/*"

extraResources:
  - from: ".env"
    to: ".env"

publish:
  provider: github
  owner: tourewriter-collab
  repo: Benna-Stock-Manager
  releaseType: release

win:
  target: nsis
  icon: build/icon.png

nsis:
  artifactName: "Benna-Business-Manager-Setup-${version}.${ext}"
  oneClick: false
  deleteAppDataOnUninstall: false
  include: "build/installer.nsh"
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Benna Projects Manager"

mac:
  target: dmg
  artifactName: "Benna-Business-Manager-${version}.${ext}"
  identity: null
  icon: build/icon.png
  category: public.app-category.business
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target: AppImage
  icon: build/icon.png
