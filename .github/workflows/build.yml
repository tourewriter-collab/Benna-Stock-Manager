name: Build Electron App

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact_ext: exe
          - os: macos-13
            target: mac --x64
            artifact_ext: dmg
          - os: macos-latest
            target: mac --arm64
            artifact_ext: dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Create .env from GitHub secrets so the build has all required env vars
      - name: Create .env file
        shell: bash
        run: |
          cat > .env << 'ENVEOF'
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN=${{ secrets.GH_TOKEN }}
          ENVEOF
          # Trim leading whitespace from each line
          sed -i.bak 's/^[[:space:]]*//' .env && rm -f .env.bak

      - name: Install dependencies
        run: npm install

      # Rebuild native modules (better-sqlite3) for the correct platform
      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build frontend
        run: npm run build

      - name: Package Electron app
        run: npx electron-builder --${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Upload all build outputs from the release directory
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
            release/*.yaml
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.blockmap
            artifacts/**/*.yml
            artifacts/**/*.yaml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
