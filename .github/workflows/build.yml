name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create placeholder .env for build
        shell: powershell
        run: |
          if (-not (Test-Path ".env")) {
            Copy-Item ".env.example" ".env" -ErrorAction SilentlyContinue
            if (-not (Test-Path ".env")) {
              New-Item -Path ".env" -ItemType File -Force | Out-Null
              Add-Content ".env" "# Populated at runtime by user"
            }
          }

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron and publish release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run electron:build

      - name: Get version from package.json
        id: get_version
        run: |
          $version = (Get-Content -Raw -Path package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: v${{ steps.get_version.outputs.VERSION }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
